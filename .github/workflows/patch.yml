name: Auto Build and Release ReVanced

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Rebuild every app (ignore incremental check)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  download-tools:
    name: Download ReVanced Tools
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.cache-key }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      
      - name: Download ReVanced Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          curl -L "https://github.com/revanced/revanced-cli/releases/latest/download/revanced-cli-all.jar" -o tools/revanced-cli.jar
          curl -L "https://github.com/revanced/revanced-patches/releases/latest/download/patches.jar" -o tools/patches.jar
          curl -L "https://github.com/revanced/revanced-integrations/releases/latest/download/app-release-unsigned.apk" -o tools/integrations.apk
      
      - name: Cache Tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: tools/
          key: revanced-tools-${{ hashFiles('patch-config.json', 'arch-config.json') }}
      
      - name: Generate Cache Key
        id: cache-key
        run: echo "cache-key=${{ steps.cache-tools.outputs.cache-key || 'no-cache' }}" >> $GITHUB_OUTPUT

  check-updates:
    name: Check for Updates
    needs: download-tools
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      build_matrix: ${{ steps.check.outputs.build_matrix }}
      update_count: ${{ steps.check.outputs.update_count }}
      total_count: ${{ steps.check.outputs.total_count }}
      carry_count: ${{ steps.check.outputs.carry_count }}
      incremental: ${{ steps.check.outputs.incremental }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Incremental Update Check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_REBUILD: ${{ inputs.force_full_rebuild || 'false' }}
        run: |
          python scripts/check_app_updates.py

      - name: Show Plan Summary
        run: |
          echo "Total entries:   ${{ steps.check.outputs.total_count }}"
          echo "Need rebuild:    ${{ steps.check.outputs.update_count }}"
          echo "Carry over:      ${{ steps.check.outputs.carry_count }}"
          echo "Incremental:     ${{ steps.check.outputs.incremental }}"

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: |
            build_matrix.json
            carry_over.json
            new_manifest.json
          if-no-files-found: warn
          retention-days: 1

  patch-apps:
    name: Read Configuration
    needs: [check-updates, download-tools]
    runs-on: ubuntu-latest
    if: needs.check-updates.outputs.has_updates == 'true'
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Build Matrix from Check
        id: read-matrix
        run: |
          MATRIX='${{ needs.check-updates.outputs.build_matrix }}'
          if [ -z "$MATRIX" ] || [ "$MATRIX" = "null" ]; then
            echo "Empty matrix from check; falling back to full patch-config.json"
            MATRIX=$(jq -c '.patch_list' patch-config.json)
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX" | head -c 1000

  build-apps:
    name: Build Applications
    needs: patch-apps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.patch-apps.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cached Tools
        uses: actions/cache@v4
        with:
          path: tools/
          key: revanced-tools-${{ hashFiles('patch-config.json', 'arch-config.json') }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Build APK
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.app_name }} with ${{ matrix.source }}..."
          sleep $((RANDOM % 30)).$((RANDOM % 100))
          
          python -m src

      - name: Record Build Outputs
        if: always()
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
        run: |
          mkdir -p build_records
          # Record every produced APK so manifest can map (app, source, arch) -> filename
          for apk in *.apk; do
            [ -e "$apk" ] || continue
            APK_PATH="$apk" python scripts/record_build.py || true
          done
          echo "Records produced:"
          ls -la build_records/ 2>/dev/null || echo "(no records)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.app_name }}-${{ matrix.source }}
          path: "*.apk"

      - name: Upload Build Records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-records-${{ matrix.app_name }}-${{ matrix.source }}
          path: build_records/
          if-no-files-found: ignore

  create-single-release:
    name: Create Single Release
    needs: [check-updates, build-apps]
    runs-on: ubuntu-latest
    if: always() && needs.check-updates.outputs.has_updates == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Plan
        uses: actions/download-artifact@v4
        with:
          name: build-plan
          path: ./build-plan
        continue-on-error: true

      - name: Download All APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-apks
          pattern: apk-*
          if-no-files-found: warn

      - name: Download All Build Records
        uses: actions/download-artifact@v4
        with:
          path: ./all-records
          pattern: build-records-*
        continue-on-error: true

      - name: Carry Over Unchanged APKs From Previous Release
        if: needs.check-updates.outputs.incremental == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p ./carry-apks
          PLAN_FILE="./build-plan/carry_over.json"
          if [ ! -f "$PLAN_FILE" ]; then
            echo "No carry_over.json plan found; skipping carry-over."
            exit 0
          fi
          CARRY_COUNT=$(jq 'length' "$PLAN_FILE")
          echo "Carry-over plan has $CARRY_COUNT APK(s)."
          if [ "$CARRY_COUNT" -eq 0 ]; then
            echo "Nothing to carry over."
            exit 0
          fi
          if ! gh release view latest >/dev/null 2>&1; then
            echo "⚠️ No previous 'latest' release exists; cannot carry over. Continuing without carry-over."
            exit 0
          fi
          # Download each carry-over APK individually so a single missing asset
          # doesn't abort the entire job.
          jq -r '.[].apk' "$PLAN_FILE" | while read -r apk_name; do
            [ -z "$apk_name" ] && continue
            echo "↩️  Carrying over: $apk_name"
            if ! gh release download latest --pattern "$apk_name" --dir ./carry-apks --clobber 2>/dev/null; then
              echo "   ⚠️  Could not download $apk_name from previous release (will be skipped)."
            fi
          done
          echo "Carry-over APKs:"
          ls -la ./carry-apks/ 2>/dev/null || true

      - name: Check if Any APKs Were Built
        id: check-apks
        run: |
          built_count=$(find ./all-apks -name "*.apk" 2>/dev/null | wc -l)
          carry_count=$(find ./carry-apks -name "*.apk" 2>/dev/null | wc -l || echo 0)
          total_count=$((built_count + carry_count))
          echo "Built APKs: $built_count, Carry-over APKs: $carry_count, Total: $total_count"

          if [ $total_count -eq 0 ]; then
            echo "❌ No APKs available (built or carried-over)"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "✅ $total_count APK(s) ready for release"
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Delete Old Release
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if "latest" release exists and delete it
          echo "🔄 Checking for existing 'latest' release..."
          if gh release view latest >/dev/null 2>&1; then
            echo "🗑️ Deleting old 'latest' release..."
            gh release delete latest --yes --cleanup-tag
            echo "✅ Old release deleted"
          else
            echo "📭 No existing 'latest' release found"
          fi
      
      - name: Collect All APKs
        if: steps.check-apks.outputs.skip_release == 'false'
        run: |
          mkdir -p ./release-apks

          # Copy freshly built APKs
          echo "📦 Collecting freshly built APKs..."
          find ./all-apks -name "*.apk" -exec cp -n {} ./release-apks/ \; 2>/dev/null || true

          # Copy carry-over APKs (don't overwrite if same name appeared in build)
          if [ -d ./carry-apks ]; then
            echo "📦 Collecting carry-over APKs..."
            find ./carry-apks -name "*.apk" -exec cp -n {} ./release-apks/ \; 2>/dev/null || true
          fi

          echo "📁 APKs ready for release:"
          ls -la ./release-apks/

          final_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")
          echo "📊 Total APKs: $final_count"

      - name: Build Final Manifest
        if: steps.check-apks.outputs.skip_release == 'false'
        run: |
          echo "🧾 Building manifest.json from build-plan + build records..."
          # The new_manifest.json (post-plan baseline) lives in the build-plan artifact
          if [ -f ./build-plan/new_manifest.json ]; then
            cp ./build-plan/new_manifest.json ./new_manifest.json
          fi
          # Flatten all per-build records into one directory
          mkdir -p build_records
          if [ -d ./all-records ]; then
            find ./all-records -name "*.json" -exec cp {} build_records/ \; 2>/dev/null || true
          fi
          python scripts/merge_manifest.py || {
            echo "⚠️ merge_manifest.py failed; continuing without manifest update."
            rm -f manifest.json
          }
          if [ -f manifest.json ]; then
            echo "✅ manifest.json built:"
            jq '.entries | length' manifest.json || true
            cp manifest.json ./release-apks/manifest.json
          fi
      
      - name: Generate Release Notes
        if: steps.check-apks.outputs.skip_release == 'false'
        run: |
          echo "📝 Generating release notes..."
          
          cat > release_notes.md << 'EOF'
          # ReVanced APKs - Auto Built
          
          ## 📱 Available Apps
          
          EOF
          
          # Group apps by name (remove architecture suffix for grouping)
          declare -A app_info
          
          for apk in ./release-apks/*.apk; do
            if [ -f "$apk" ]; then
              filename=$(basename "$apk")
              
              # Extract app name (remove architecture and version info)
              app_name=$(echo "$filename" | sed -E 's/-(arm64-v8a|armeabi-v7a|universal|patch|revanced|cli)-.*//' | sed 's/-/ /g')
              
              # Extract architecture
              if [[ "$filename" == *"arm64-v8a"* ]]; then
                arch="arm64-v8a"
              elif [[ "$filename" == *"armeabi-v7a"* ]]; then
                arch="armeabi-v7a"
              else
                arch="universal"
              fi
              
              # Extract version
              version=$(echo "$filename" | grep -oE 'v[0-9]+\.[0-9]+(\.[0-9]+)*' | head -1 || echo "unknown")
              
              # Store in associative array
              key="$app_name"
              if [ -z "${app_info[$key]}" ]; then
                app_info[$key]=""
              fi
              app_info[$key]="${app_info[$key]}<br>• $arch: $version"
            fi
          done
          
          # Create a simple markdown list
          for app in "${!app_info[@]}"; do
            echo "### $app" >> release_notes.md
            echo "${app_info[$app]:4}" | sed 's/<br>/\n/g' >> release_notes.md
            echo "" >> release_notes.md
          done
          
          cat >> release_notes.md << 'EOF'
          ---
          
          ## ⚙️ Build Information
          - **Auto-built daily at 6 AM UTC**
          - **Multiple architecture support** (arm64-v8a, armeabi-v7a, universal)
          - **Latest ReVanced patches**
          - **Updated automatically**
          
          ## 📊 Architecture Guide
          - **arm64-v8a**: Modern ARM devices (2014+)
          - **armeabi-v7a**: Older ARM devices
          - **universal**: All ARM devices (larger file)
          
          ## ⚠️ Disclaimer
          These APKs are built automatically. Use at your own risk.
          
          ## 🔄 Update Schedule
          - Automatic updates daily at 6 AM UTC
          - Manual updates available via workflow dispatch
          - Always replaces the previous release
          EOF
      
      - name: Create New Release
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Creating new release with APKs..."

          # Count APKs
          apk_count=$(ls -1 ./release-apks/*.apk 2>/dev/null | wc -l || echo "0")

          if [ $apk_count -eq 0 ]; then
            echo "❌ No APKs found to release"
            exit 1
          fi

          echo "📦 Releasing $apk_count APK(s)..."

          # Build the asset list: APKs + optional manifest.json
          ASSETS=( ./release-apks/*.apk )
          if [ -f ./release-apks/manifest.json ]; then
            ASSETS+=( ./release-apks/manifest.json )
            echo "📎 Including manifest.json"
          fi

          # Create the release
          gh release create "latest" \
            --title "ReVanced APKs - $(date +'%Y-%m-%d %H:%M')" \
            --notes-file release_notes.md \
            "${ASSETS[@]}" \
            --latest

          echo "✅ Release created successfully!"
      
      - name: Display Release URL
        if: steps.check-apks.outputs.skip_release == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release view latest --json url --jq .url)
          echo "🔗 Release URL: $release_url"
          echo ""
          echo "📦 Direct Download Links:"
          for apk in ./release-apks/*.apk; do
            filename=$(basename "$apk")
            echo "- $filename: $release_url/download/$filename"
          done

  cleanup:
    name: Cleanup Workflow Runs
    needs: [build-apps, create-single-release]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5
